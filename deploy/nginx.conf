# ─── Redirect all HTTP → HTTPS ────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let Certbot manage its ACME challenge files
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS / TLS ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS certificates (managed by Certbot) ────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── HSTS: tell browsers to only use HTTPS for 1 year ─────────────────────
    # includeSubDomains — covers *.yourdomain.com
    # preload — eligible for browser preload lists (submit at hstspreload.org)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Additional security headers ───────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

    root /var/www/xponet/dist;
    index index.html;

    # ── Hashed static assets (JS / CSS / media with content hash in filename) ─
    # Vite names these: assets/index-Bx1AbCd.js, assets/index-Bx1AbCd.css, etc.
    # Safe to cache for 1 year; the hash changes on every build.
    location ~* ^/assets/.+\.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        access_log off;
    }

    # ── index.html — must never be cached so new deploys take effect instantly ─
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # ── SPA fallback: all other routes → index.html ───────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;
}
