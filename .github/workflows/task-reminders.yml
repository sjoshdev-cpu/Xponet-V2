name: Task Due-Date Reminders

on:
  schedule:
    # Every 15 min so queued invitation emails go out promptly. Task reminders
    # are idempotent (reminders_sent markers) so extra runs are safe.
    - cron: '*/15 * * * *'
  workflow_dispatch: {}    # lets you trigger it manually from the Actions tab, for testing

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install firebase-admin nodemailer

      - name: Send reminders
        run: node scripts/send-task-reminders.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
