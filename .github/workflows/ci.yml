name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (errors fail; warnings are tracked debt)
        run: npx eslint src

      - name: Unit tests
        run: npx vitest run --reporter=dot

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Firestore rules tests (emulator)
        run: npx firebase emulators:exec --only firestore --project demo-xponet "npx vitest run --config vitest.rules.config.js --reporter=dot"

      - name: Build
        run: npm run build
