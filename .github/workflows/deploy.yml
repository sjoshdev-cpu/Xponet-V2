name: Deploy to production VM

# Deploys dist/ to the GCP VM (nginx) on every push to main, replacing the
# manual SSH ritual. Requirements (one-time setup):
#   1. Repo secret DEPLOY_SSH_KEY — private key whose public half is in
#      ~/.ssh/authorized_keys for the deploy user on the VM.
#   2. The deploy user needs passwordless sudo for the copy/reload commands
#      (GCP OS Login users have this by default).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  VM_HOST: "35.232.106.86"
  VM_USER: "exponentbizolution"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload build
        run: |
          tar -czf dist.tar.gz -C dist .
          scp dist.tar.gz "$VM_USER@$VM_HOST:/tmp/xponet-dist.tar.gz"

      - name: Publish and reload nginx
        run: |
          ssh "$VM_USER@$VM_HOST" '
            set -e
            rm -rf /tmp/xponet-dist && mkdir -p /tmp/xponet-dist
            tar -xzf /tmp/xponet-dist.tar.gz -C /tmp/xponet-dist
            sudo rm -rf /var/www/html/*
            sudo cp -r /tmp/xponet-dist/* /var/www/html/
            sudo chown -R www-data:www-data /var/www/html/
            sudo chmod -R 755 /var/www/html/
            sudo systemctl reload nginx
            rm -rf /tmp/xponet-dist /tmp/xponet-dist.tar.gz
            echo "Deployed $(date -u +%FT%TZ)"
          '
